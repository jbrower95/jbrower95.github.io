<html>

	<head>
		<title>J's Site</title>
		<link rel="stylesheet" type="text/css" href="./index.css">
	</head>


	<body>
		<script type="text/javascript">

		window.onload = addListeners;

		function addListeners(){
    		document.getElementById('dragbar').addEventListener('mousedown', mouseDown, false);
    		window.addEventListener('mouseup', mouseUp, false);
		};

		function mouseUp(){
    		window.removeEventListener('mousemove', divMove, true);
		};

		function mouseDown(e){
  			window.addEventListener('mousemove', divMove, true);
		};

		function divMove(e){
 			var div = document.getElementById('mainWindow');
  			div.style.position = 'absolute';
  			div.style.top = e.clientY + 'px';
  			div.style.left = e.clientX + 'px';
		};
		</script>
		<div class="fullPage" id="pageOne">

			<h1> Justin's website </h1>

			<div class="window" id="mainWindow">
				<div id="dragbar">This is a drag bar</div>
				<p class="searchbar">
					Welcome!
				</p>
				<p class="textbox">
					Click the start menu to see some projects i've done (or am doing currently!)
				</p>
			</div>


		</div>
		<div class="footer">

			<ul class="taskBar">
				<li> <button>Start</button> </li>
				<li> <button>End</button> </li>
				<li> <button>Next</button> </li>
			</ul>




		</div>

		<script src='http://code.jquery.com/jquery-1.8.3.min.js'></script>
		<link rel="stylesheet" href="//cdn.jsdelivr.net/clippy.js/1.0/clippy.min.css">
		<script src="//cdn.jsdelivr.net/clippy.js/1.0/clippy.min.js"></script>

		<script type="text/javascript">
    		clippy.load('Clippy', function(agent) {
        	agent.show();
        	agent.moveTo(440,410);
        	agent.speak('Welcome! Press start to begin.');
    	});
		</script>
		
	</body>




</htmL>
